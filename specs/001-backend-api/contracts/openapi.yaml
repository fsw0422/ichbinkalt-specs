openapi: 3.1.0
info:
  title: AI Conversation API
  version: 1.0.0
  description: API for real-time audio-based conversations with a German-learning AI. Backend handles STT via Gemini Live API's native transcription. Audio responses are also provided by Gemini Live.

paths:
  /api/v1/conversations:
    post:
      summary: Start a new conversation
      operationId: start_conversation
      responses:
        '201':
          description: Conversation created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation_id:
                    type: string
                    format: uuid
                    description: The unique identifier for the conversation session.
                  websocket_url:
                    type: string
                    format: uri
                    description: The URL for the WebSocket connection.

  /ws/v1/conversations/{conversation_id}:
    get:
      summary: WebSocket connection for an active conversation
      description: This endpoint is not a standard HTTP endpoint but represents the WebSocket connection.
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '101':
          description: Switching protocols to WebSocket.

  /api/v1/users/{userId}:
    get:
      summary: Get full user profile
      operationId: get_user
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: Full user profile assembled from the user core, learning profile, usage stats, and preferences.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullUserResponse'
        '404':
          description: User not found.
    put:
      summary: Update user core identity
      operationId: update_user
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullUserResponse'
        '404':
          description: User not found.

  /api/v1/users/{userId}/learning-profile:
    put:
      summary: Create or update user's learning profile
      operationId: update_learning_profile
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLearningProfileRequest'
      responses:
        '200':
          description: Learning profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLearningProfileResponse'
        '404':
          description: User not found.

  /api/v1/users/{userId}/preferences:
    put:
      summary: Create or update user's preferences
      operationId: update_preferences
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesRequest'
      responses:
        '200':
          description: Preferences updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferencesResponse'
        '404':
          description: User not found.

  /api/v1/auth/passkeys/registration-options:
    post:
      summary: Get WebAuthn registration challenge options for sign-up
      description: Creates or resumes the single account bound to the normalized email and returns WebAuthn registration options immediately for first-passkey registration.
      operationId: get_initial_passkey_registration_options
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegistrationOptionsRequest'
      responses:
        '200':
          description: WebAuthn registration options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyRegistrationOptions'
        '409':
          description: The normalized email already belongs to an account with a registered passkey. Use passkey authentication or recovery instead.

  /api/v1/auth/passkeys/register:
    post:
      summary: Register the first passkey and issue a session
      description: Completes initial passkey-first sign-up for the unique email-bound account and returns full session tokens. Email verification is a separate later flow.
      operationId: register_initial_passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegistrationRequest'
      responses:
        '201':
          description: Passkey registered successfully. Returns JWT tokens for the new application session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid credential.
        '409':
          description: The normalized email already belongs to an account with a registered passkey. Use passkey authentication or recovery instead.

  /api/v1/auth/email-verification-link:
    post:
      summary: Request an email-verification link
      description: Sends a single-use inbox-verification email for the signed-in user's unique email address. Successful verification later marks `emailConfirmed = true` and unlocks subscription-based services.
      operationId: request_email_verification_link
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailAddressRequest'
      responses:
        '200':
          description: Email-verification link sent.
        '401':
          description: Missing or invalid access token.
        '429':
          description: Rate limit exceeded (5 requests per email per hour).

  /api/v1/auth/verify-email:
    post:
      summary: Verify inbox ownership for subscription enablement
      description: Verifies a single-use email-verification token, marks `emailConfirmed = true` on the corresponding user, and returns the updated verification state.
      operationId: verify_email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailTokenRequest'
      responses:
        '200':
          description: Email verified successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationResponse'
        '401':
          description: Token is invalid, expired, or already used.

  /api/v1/auth/passkeys/recovery-link:
    post:
      summary: Request a passkey recovery or account reclaim email
      description: Sends a single-use recovery email link to the single account bound to the normalized email. The same entrypoint may be surfaced in client UX as `Forgot Password?`. After the token is verified, the client receives a recovery bootstrap token and routes directly into passkey re-registration.
      operationId: request_passkey_recovery_link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailAddressRequest'
      responses:
        '200':
          description: Passkey recovery or account reclaim email sent (response is always 200 to prevent email enumeration).
        '429':
          description: Rate limit exceeded.

  /api/v1/auth/passkeys/verify-recovery:
    post:
      summary: Verify a passkey recovery email link
      description: Verifies a recovery token, auto-confirms the email, revokes stale passkeys and refresh tokens when reclaim is needed, and returns a scoped bootstrap token that only authorizes passkey re-registration.
      operationId: verify_passkey_recovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRecoveryTokenRequest'
      responses:
        '200':
          description: Recovery token verified. Returns a scoped bootstrap token for passkey re-registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapAuthResponse'
        '401':
          description: Token is invalid, expired, or already used.

  /api/v1/auth/passkeys/re-registration-options:
    post:
      summary: Get WebAuthn re-registration challenge options
      description: Used during passkey recovery or account reclaim after recovery verification to complete replacement passkey registration.
      operationId: get_passkey_reregistration_options
      security:
        - bootstrapAuth: []
      responses:
        '200':
          description: WebAuthn registration options for replacement passkey registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyRegistrationOptions'
        '401':
          description: Missing, expired, or invalid recovery bootstrap token.

  /api/v1/auth/passkeys/re-register:
    post:
      summary: Register a replacement passkey
      description: Completes recovery-backed passkey replacement and returns a new application session. Recovery verification already confirmed inbox ownership.
      operationId: reregister_passkey
      security:
        - bootstrapAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyReRegistrationRequest'
      responses:
        '201':
          description: Replacement passkey registered successfully. Returns JWT tokens for the new application session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid credential.
        '401':
          description: Missing, expired, or invalid recovery bootstrap token.

  /api/v1/auth/passkeys/authentication-options:
    post:
      summary: Get WebAuthn authentication challenge options
      description: Returns passkey authentication options for a returning user with a registered passkey.
      operationId: get_passkey_authentication_options
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticationOptionsRequest'
      responses:
        '200':
          description: WebAuthn authentication options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAuthenticationOptions'

  /api/v1/auth/passkeys/authenticate:
    post:
      summary: Authenticate with a passkey
      description: Verifies a passkey assertion and returns session tokens for a returning user.
      operationId: authenticate_passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticationCredential'
      responses:
        '200':
          description: Authentication successful. Returns JWT tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid passkey assertion.

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      operationId: refresh_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Refresh token is invalid, expired, or revoked.

  /api/v1/auth/logout:
    post:
      summary: Logout and revoke refresh token
      description: Revokes the current refresh token. Any later login should use passkey authentication, or the recovery/account-reclaim flow if credentials are lost or inbox ownership must be re-established.
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Refresh token revoked.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access bearer token containing identity and verified-session facts. Mutable lifecycle and entitlement checks are enforced against current server-side data.
    bootstrapAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Scoped bootstrap bearer token returned by passkey recovery verification and limited to passkey re-registration endpoints.

  parameters:
    userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        description: ULID user identifier.

  schemas:
    # ---- User API Schemas ----
    AccountStatus:
      type: string
      enum: [active, suspended]
      description: Hard lifecycle state used for server-side authorization checks.

    SubscriptionStatus:
      type: string
      enum: [free, trial, paid, grace, past_due]
      description: Product-access state used for billing and entitlement checks. Paid or upgraded states additionally require verified email ownership.

    BootstrapPurpose:
      type: string
      enum: [passkey_recovery]
      description: Indicates that the bootstrap flow comes from passkey recovery or account reclaim.

    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 255
      required:
        - displayName

    FullUserResponse:
      type: object
      properties:
        userId:
          type: string
          description: ULID user identifier.
        emailConfirmed:
          type: boolean
          description: Durable inbox-ownership proof for the account. Paid services and upgrades require this to be true.
        accountStatus:
          $ref: '#/components/schemas/AccountStatus'
        onboardingComplete:
          type: boolean
          description: True when the user currently has at least one registered passkey.
        subscriptionStatus:
          $ref: '#/components/schemas/SubscriptionStatus'
        displayName:
          type: string
        email:
          type: string
          format: email
          description: Unique account email address. Matching is case-insensitive after trimming and lowercasing.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
        learningProfile:
          $ref: '#/components/schemas/UserLearningProfileResponse'
        usageStats:
          $ref: '#/components/schemas/UserUsageStatsResponse'
        preferences:
          $ref: '#/components/schemas/UserPreferencesResponse'

    UpdateLearningProfileRequest:
      type: object
      properties:
        learningLevel:
          type: string
          enum: [A1, A2, B1, B2, C1, C2]
        nativeLanguage:
          type: string
          minLength: 1
          maxLength: 100
        learningGoals:
          type: array
          items:
            type: string
            enum: [travel, work, academic, immigration, hobby]
        correctionStyle:
          type: string
          enum: [gentle, moderate, strict]
        topicsOfInterest:
          type: array
          items:
            type: string
      required:
        - learningLevel
        - nativeLanguage
        - correctionStyle

    UserLearningProfileResponse:
      type: object
      properties:
        userId:
          type: string
          description: ULID user identifier.
        learningLevel:
          type: string
          enum: [A1, A2, B1, B2, C1, C2]
        nativeLanguage:
          type: string
        learningGoals:
          type: array
          items:
            type: string
            enum: [travel, work, academic, immigration, hobby]
        correctionStyle:
          type: string
          enum: [gentle, moderate, strict]
        topicsOfInterest:
          type: array
          items:
            type: string

    UserUsageStatsResponse:
      type: object
      properties:
        userId:
          type: string
          description: ULID user identifier.
        totalConversationCount:
          type: integer
        totalPracticeMinutes:
          type: integer
        currentStreak:
          type: integer
        longestStreak:
          type: integer

    UpdatePreferencesRequest:
      type: object
      properties:
        timezone:
          type: string
          description: IANA timezone identifier (e.g. Europe/Berlin)
          maxLength: 100
        uiLanguage:
          type: string
          description: UI language code (e.g. en, de, ko)
          maxLength: 10
      required:
        - timezone
        - uiLanguage

    UserPreferencesResponse:
      type: object
      properties:
        userId:
          type: string
          description: ULID user identifier.
        timezone:
          type: string
        uiLanguage:
          type: string

    # ---- Auth Schemas ----
    EmailAddressRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Unique account email address. Matching and uniqueness use trimmed lowercase normalization.
      required:
        - email

    VerifyEmailTokenRequest:
      type: object
      properties:
        token:
          type: string
          description: The emailed token from an inbox-verification URL.
      required:
        - token

    VerifyRecoveryTokenRequest:
      type: object
      properties:
        token:
          type: string
          description: The emailed token from a passkey-recovery URL.
      required:
        - token

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token (15 min expiry) containing identity and verified-session facts only.
        refreshToken:
          type: string
          description: Refresh token (7 day expiry).
        userId:
          type: string
          description: ULID user identifier.
        accountStatus:
          $ref: '#/components/schemas/AccountStatus'
        onboardingComplete:
          type: boolean
          description: True when the user currently has at least one registered passkey.
        subscriptionStatus:
          $ref: '#/components/schemas/SubscriptionStatus'

    EmailVerificationResponse:
      type: object
      properties:
        userId:
          type: string
          description: ULID user identifier.
        emailConfirmed:
          type: boolean
          description: Always true after successful email verification.

    BootstrapAuthResponse:
      type: object
      properties:
        bootstrapToken:
          type: string
          description: Scoped bootstrap bearer token used only for passkey re-registration endpoints. Recommended claims are `sub`, `jti`, `tokenType = bootstrap`, `purpose = passkey_recovery`, `scope = passkey_registration`, and `exp`.
        userId:
          type: string
          description: ULID user identifier.
        purpose:
          $ref: '#/components/schemas/BootstrapPurpose'
        passkeyRegistrationRequired:
          type: boolean
          description: Always true for a verified recovery or account-reclaim bootstrap flow so the client can route directly into passkey re-registration.

    PasskeyRegistrationOptionsRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Unique account email address. Matching and uniqueness use trimmed lowercase normalization.
      required:
        - email

    PasskeyRegistrationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Unique account email address. Matching and uniqueness use trimmed lowercase normalization.
        credential:
          $ref: '#/components/schemas/PasskeyRegistrationCredential'
        deviceName:
          type: string
          description: Optional user-visible label for the passkey device.
      required:
        - email
        - credential

    PasskeyReRegistrationRequest:
      type: object
      properties:
        credential:
          $ref: '#/components/schemas/PasskeyRegistrationCredential'
        deviceName:
          type: string
          description: Optional user-visible label for the replacement passkey device.
      required:
        - credential

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken

    PasskeyRegistrationOptions:
      type: object
      description: WebAuthn PublicKeyCredentialCreationOptions (structure defined by WebAuthn spec).

    PasskeyRegistrationCredential:
      type: object
      description: WebAuthn registration response from navigator.credentials.create() (structure defined by WebAuthn spec).

    PasskeyAuthenticationOptionsRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Unique account email address. Matching is case-insensitive after trimming and lowercasing.
      required:
        - email

    PasskeyAuthenticationOptions:
      type: object
      description: WebAuthn PublicKeyCredentialRequestOptions (structure defined by WebAuthn spec).

    PasskeyAuthenticationCredential:
      type: object
      description: WebAuthn authentication response from navigator.credentials.get() (structure defined by WebAuthn spec).

    # ---- WebSocket Message Schemas ----
    ClientMessage:
      oneOf:
        - $ref: '#/components/schemas/AudioChunk'
        - $ref: '#/components/schemas/AudioStreamEnd'
        - $ref: '#/components/schemas/TerminateSession'

    ServerMessage:
      oneOf:
        - $ref: '#/components/schemas/InputTranscription'
        - $ref: '#/components/schemas/OutputTranscription'
        - $ref: '#/components/schemas/AIAudioResponse'

    AudioChunk:
      type: object
      description: Audio data chunk sent from client to server (PCM format, base64 encoded).
      properties:
        event:
          type: string
          enum: [audio_chunk]
        audio:
          type: string
          format: byte
          description: Base64-encoded PCM audio data (16kHz, 16-bit, mono).
      required:
        - event
        - audio

    AudioStreamEnd:
      type: object
      description: Signal that the audio stream has ended (e.g., user stopped speaking).
      properties:
        event:
          type: string
          enum: [audio_stream_end]
      required:
        - event

    TerminateSession:
      type: object
      properties:
        event:
          type: string
          enum: [terminate_session]

    InputTranscription:
      type: object
      description: Transcription of user's audio input, provided by Gemini Live's inputAudioTranscription feature.
      properties:
        event:
          type: string
          enum: [input_transcription]
        text:
          type: string
          description: The transcribed text from the user's audio input.
        conversationId:
          type: string
          format: uuid
          description: The conversation this transcription belongs to.
      required:
        - event
        - text
        - conversationId

    OutputTranscription:
      type: object
      description: Transcription of AI's audio output, provided by Gemini Live's outputAudioTranscription feature.
      properties:
        event:
          type: string
          enum: [output_transcription]
        text:
          type: string
          description: The transcribed text of the AI's spoken response.
        conversationId:
          type: string
          format: uuid
          description: The conversation this transcription belongs to.
      required:
        - event
        - text
        - conversationId

    AIAudioResponse:
      type: object
      description: AI's audio response in PCM format, generated by Gemini Live's native audio model.
      properties:
        event:
          type: string
          enum: [ai_audio_response]
        audioData:
          type: string
          format: byte
          description: Base64-encoded PCM audio data (24kHz, 16-bit, mono).
        mimeType:
          type: string
          description: The MIME type of the audio data (e.g., audio/pcm).
      required:
        - event
        - audioData
        - mimeType
